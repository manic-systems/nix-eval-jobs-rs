name: Build and Test with Cargo

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
    uses: manic-systems/workflows/.github/workflows/rust-checks.yml@8e0aa91fd3b74f101424d4e36ac743c8f8403a32
    with:
      os: ${{ matrix.os }}
      flake-check-command: nix build .#packages.${{ matrix.system }}.default && nix flake check --no-build
