name: Nix VM Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  eval-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@master
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run eval VM test
        run: nix build .#checks.x86_64-linux.eval
